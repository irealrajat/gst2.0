<!-- ── PASSWORD GATE HTML ── -->
<div id="auth-gate">
  <div class="auth-box">
    <div class="auth-logo">

    <button class="auth-btn" id="auth-btn" onclick="checkAuth()">🔓 Unlock Software</button>
    <div id="auth-error" style="display:none" class="auth-error">❌ Wrong password. Try again.</div>
    <div id="auth-attempts" class="auth-attempts"></div>
    <div class="auth-footer">🔒 BizGST Pro · Secured Access · Only authorized users can view this software</div>
  </div>
</div>

<!-- ── AUTH SCRIPT (runs before React) ── -->
<script>
// ── CONFIGURATION ──────────────────────────────────────────────────────────────
// Password is stored as SHA-256 hash — NEVER store plaintext password in code!
// Default password: BizGST@2024  (change this hash after updating your password)
// To generate a new hash: open browser console → type:
//   crypto.subtle.digest('SHA-256', new TextEncoder().encode('YourNewPassword'))
//     .then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))

const PASSWORD_HASH = '67ca6a0e11369b348069dccd28adb2b897e1b10f3b94ccb95589b61ad37e0f04'; 
// ⚠️  Above is placeholder. Replace with your actual hash (see README.md for instructions)
// Real default: BizGST@2024 → run the command above to generate actual hash

const SESSION_KEY   = 'bizgst_auth_v1';   // sessionStorage key
const MAX_ATTEMPTS  = 5;                  // lockout after 5 wrong attempts
const LOCKOUT_MIN   = 15;                 // lockout duration in minutes

let attempts = parseInt(sessionStorage.getItem('bizgst_attempts') || '0');
let lockoutUntil = parseInt(sessionStorage.getItem('bizgst_lockout') || '0');

// ── Already authenticated this session? Skip gate immediately ──────────────────
if (sessionStorage.getItem(SESSION_KEY) === 'true') {
  document.getElementById('auth-gate').classList.add('hidden');
}

// ── Hash helper using Web Crypto API ──────────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(x => x.toString(16).padStart(2, '0')).join('');
}

async function checkAuth() {
  const now = Date.now();

  // Check lockout
  if (lockoutUntil > now) {
    const mins = Math.ceil((lockoutUntil - now) / 60000);
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-error').innerHTML = `🔒 Too many attempts! Try again in <strong>${mins} minute${mins>1?'s':''}</strong>.`;
    document.getElementById('auth-btn').disabled = true;
    return;
  }

  const input = document.getElementById('pwd-input').value;
  if (!input) return;

  document.getElementById('auth-btn').disabled = true;
  document.getElementById('auth-btn').textContent = 'Verifying...';

  const hash = await sha256(input);

  if (hash === PASSWORD_HASH) {
    // ✅ Correct password
    sessionStorage.setItem(SESSION_KEY, 'true');
    sessionStorage.removeItem('bizgst_attempts');
    sessionStorage.removeItem('bizgst_lockout');
    const gate = document.getElementById('auth-gate');
    gate.style.animation = 'authFadeIn .3s ease reverse';
    setTimeout(() => gate.classList.add('hidden'), 280);
  } else {
    // ❌ Wrong password
    attempts++;
    sessionStorage.setItem('bizgst_attempts', attempts);
    document.getElementById('pwd-input').value = '';
    document.getElementById('auth-btn').disabled = false;
    document.getElementById('auth-btn').textContent = '🔓 Unlock Software';

    const remaining = MAX_ATTEMPTS - attempts;
    document.getElementById('auth-error').style.display = 'block';

    if (attempts >= MAX_ATTEMPTS) {
      // Lockout!
      const until = now + LOCKOUT_MIN * 60 * 1000;
      sessionStorage.setItem('bizgst_lockout', until);
      lockoutUntil = until;
      document.getElementById('auth-btn').disabled = true;
      document.getElementById('auth-error').innerHTML = `🔒 <strong>${MAX_ATTEMPTS} wrong attempts!</strong> Locked for ${LOCKOUT_MIN} minutes.`;
      document.getElementById('auth-attempts').textContent = '';
    } else {
      document.getElementById('auth-error').textContent = `❌ Wrong password!`;
      document.getElementById('auth-attempts').textContent = `⚠️ ${remaining} attempt${remaining>1?'s':''} remaining before lockout.`;
    }
  }
}

// Restore lockout state on page load
window.addEventListener('DOMContentLoaded', () => {
  const now = Date.now();
  if (lockoutUntil > now) {
    const mins = Math.ceil((lockoutUntil - now) / 60000);
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-error').innerHTML = `🔒 Locked. Try again in <strong>${mins} minute${mins>1?'s':''}</strong>.`;
    document.getElementById('auth-btn').disabled = true;
  }
  if (attempts > 0 && lockoutUntil <= now) {
    document.getElementById('auth-attempts').textContent = `⚠️ ${MAX_ATTEMPTS - attempts} attempt(s) remaining.`;
  }
});
</script>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

const LS = {
  get:(k,def)=>{ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch{ return def; } },
  set:(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }
};

// ─── OTA UPDATE CHECKER ─────────────────────────────────────────────────────
const CHECK_MS = 60*1000;
const OTABanner = () => {
  const [update,setUpdate]=useState(null);
  const [dismissed,setDismissed]=useState(false);
  const current=useRef(null);
  useEffect(()=>{

        const res=await fetch(`version.json?t=${Date.now()}`);

        const data=await res.json();
        if(!current.current){current.current=data.version;}
        else if(data.version!==current.current){setUpdate(data);setDismissed(false);}
      }catch{}
    };
    check();
    const t=setInterval(check,CHECK_MS);
    return()=>clearInterval(t);
  },[]);
  if(!update||dismissed)return null;
  const bt=update.builtAt?new Date(update.builtAt).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'';
  return(
    <div className="ota-banner">
      <div className="ota-left"><div className="ota-dot"/><span>🚀 <strong>New Update Available!</strong> — Push deploy ho gaya. Reload karo latest version ke liye.</span>{bt&&<span className="ota-ver">Built: {bt}</span>}<span className="ota-ver">v{update.version?.slice(0,7)}</span></div>
      <div className="ota-actions"><button className="ota-update-btn" onClick={()=>window.location.reload(true)}>⬇ Update Now</button><button className="ota-skip-btn" onClick={()=>setDismissed(true)}>Later</button></div>
    </div>
  );
};

const fc=n=>'₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fd=d=>{if(!d)return'';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})};
const tod=()=>new Date().toISOString().split('T')[0];
const inRange=(d,s,e)=>d>=s&&d<=e;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

const getRange=(filter,cs,ce)=>{
  const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();
  switch(filter){
    case'today':{const t=tod();return{start:t,end:t}}
    case'week':{const d=now.getDay();const s=new Date(now);s.setDate(now.getDate()-d);const e=new Date(s);e.setDate(s.getDate()+6);return{start:s.toISOString().split('T')[0],end:e.toISOString().split('T')[0]}}
    case'month':return{start:new Date(yr,mo,1).toISOString().split('T')[0],end:new Date(yr,mo+1,0).toISOString().split('T')[0]}
    case'lastmonth':return{start:new Date(yr,mo-1,1).toISOString().split('T')[0],end:new Date(yr,mo,0).toISOString().split('T')[0]}
    case'quarter':{const q=Math.floor(mo/3);return{start:new Date(yr,q*3,1).toISOString().split('T')[0],end:new Date(yr,q*3+3,0).toISOString().split('T')[0]}}
    case'year':return{start:`${yr}-04-01`,end:`${yr+1}-03-31`}
    case'custom':return{start:cs||'2020-01-01',end:ce||'2099-12-31'}
    default:return{start:'2020-01-01',end:'2099-12-31'}
  }
};

const calcTotals=(items,taxType)=>{
  const calc=items.map(item=>{
    const taxable=+(item.qty*item.rate).toFixed(2);
    const tax=+(taxable*item.gstRate/100).toFixed(2);
    const cgst=taxType==='cgst_sgst'?+(tax/2).toFixed(2):0;
    const sgst=taxType==='cgst_sgst'?+(tax/2).toFixed(2):0;
    const igst=taxType==='igst'?tax:0;
    return{...item,taxable,cgst,sgst,igst,total:+(taxable+tax).toFixed(2)};
  });
  const taxable=+calc.reduce((s,i)=>s+i.taxable,0).toFixed(2);
  const cgst=+calc.reduce((s,i)=>s+i.cgst,0).toFixed(2);
  const sgst=+calc.reduce((s,i)=>s+i.sgst,0).toFixed(2);
  const igst=+calc.reduce((s,i)=>s+i.igst,0).toFixed(2);
  const totalTax=+(cgst+sgst+igst).toFixed(2);
  const gross=taxable+totalTax;
  const paise=+(gross%1).toFixed(2);
  const grandTotal=paise>=0.50?Math.ceil(gross):Math.floor(gross);
  const roundOff=+((grandTotal-gross).toFixed(2));
  return{items:calc,taxable,cgst,sgst,igst,totalTax,roundOff,grandTotal};
};

// ─── INVOICE FORM ─────────────────────────────────────────────────────────────
const InvoiceForm=({editInvoice,customers,products,invoices,co,onSave,onClose})=>{
  const isEdit=!!editInvoice;
  const [date,setDate]=useState(editInvoice?.date||tod());
  const [custId,setCustId]=useState(editInvoice?.customerId||'');
  const [items,setItems]=useState(editInvoice?.items?.map(i=>({productId:i.productId,name:i.name,hsn:i.hsn,qty:i.qty,rate:i.rate,gstRate:i.gstRate}))||[{productId:'',name:'',hsn:'',qty:1,rate:0,gstRate:18}]);
  const cust=customers.find(c=>c.id===custId);
  const taxType=cust&&cust.stateCode!==co.stateCode?'igst':'cgst_sgst';
  const totals=useMemo(()=>{
    const valid=items.filter(i=>i.productId&&i.qty>0&&i.rate>0);
    if(!valid.length)return{items:[],taxable:0,cgst:0,sgst:0,igst:0,totalTax:0,roundOff:0,grandTotal:0};
    return calcTotals(valid,taxType);
  },[items,taxType]);
  const addItem=()=>setItems(p=>[...p,{productId:'',name:'',hsn:'',qty:1,rate:0,gstRate:18}]);
  const removeItem=idx=>setItems(p=>p.filter((_,i)=>i!==idx));
  const updItem=(idx,f,v)=>setItems(p=>{
    const u=[...p];u[idx]={...u[idx],[f]:v};
    if(f==='productId'){const pr=products.find(p=>p.id===v);if(pr)u[idx]={...u[idx],name:pr.name,hsn:pr.hsn,rate:pr.salePrice,gstRate:pr.gstRate};}
    return u;
  });
  const handleSave=()=>{
    if(!custId)return alert('Please select a customer');
    if(totals.grandTotal===0)return alert('Please add at least one item with qty & rate');
    const inv={
      id:editInvoice?.id||uid(),
      invoiceNo:editInvoice?.invoiceNo||nextInvNo(invoices),
      date,customerId:custId,customerName:cust.name,customerGstin:cust.gstin,
      customerAddress:cust.address,customerState:cust.state,customerStateCode:cust.stateCode,
      taxType,subtotal:totals.taxable,...totals,
      paid:editInvoice?.paid||false
    };
    onSave(inv,isEdit);
  };
  return(
    <Modal show title={isEdit?`Edit Invoice — ${editInvoice.invoiceNo}`:'Create Sales Invoice'} size="modal-lg" onClose={onClose}
      footer={<><button className="btn btn-outline" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={handleSave}>{isEdit?'💾 Update Invoice':'💾 Save Invoice'}</button></>}>
      <div className="g3 mb4">
        <FG label="Invoice Date *"><input type="date" className="form-control" value={date} onChange={e=>setDate(e.target.value)}/></FG>
        <div className="form-group" style={{gridColumn:'span 2'}}><label className="form-label">Customer *</label>
          <select className="form-control" value={custId} onChange={e=>setCustId(e.target.value)}>
            <option value="">— Select Customer —</option>
            {customers.map(c=><option key={c.id} value={c.id}>{c.name} ({c.state})</option>)}
          </select>
        </div>
      </div>
      {cust&&<div className="alert alert-info mb4">Tax Type: <strong>{taxType==='cgst_sgst'?`CGST + SGST (Intrastate — ${cust.state})`:`IGST (Interstate — ${cust.state})`}</strong> | GSTIN: <span className="mono">{cust.gstin}</span></div>}
      <div className="card mb4">
        <div className="card-header"><h3>Line Items</h3><button className="btn btn-outline btn-sm" onClick={addItem}>+ Add Row</button></div>
        <div style={{padding:'12px 16px',overflowX:'auto'}}>
          <div className="item-grid item-hdr"><div>Product</div><div>HSN</div><div>Qty</div><div>Rate (₹)</div><div>GST %</div><div></div></div>
          {items.map((item,idx)=>(
            <div key={idx} className="item-grid">
              <select className="form-control" value={item.productId} onChange={e=>updItem(idx,'productId',e.target.value)}>
                <option value="">— Select —</option>
                {products.map(p=><option key={p.id} value={p.id}>{p.name} (Stock: {p.stock})</option>)}
              </select>
              <div className="mono sm muted" style={{paddingLeft:4}}>{item.hsn||'—'}</div>
              <input type="number" className="form-control" value={item.qty} min="1" onChange={e=>updItem(idx,'qty',parseFloat(e.target.value)||0)}/>
              <input type="number" className="form-control" value={item.rate} step="0.01" onChange={e=>updItem(idx,'rate',parseFloat(e.target.value)||0)}/>
              <select className="form-control" value={item.gstRate} onChange={e=>updItem(idx,'gstRate',parseFloat(e.target.value))}>
                {GST_RATES.map(r=><option key={r} value={r}>{r}%</option>)}
              </select>
              <button className="btn btn-danger btn-sm" onClick={()=>removeItem(idx)} disabled={items.length===1}>✕</button>
            </div>
          ))}
        </div>
      </div>
      {totals.items.length>0&&(
        <div className="card mb4"><div style={{padding:'12px 16px',overflowX:'auto'}}>
          <table style={{fontSize:12}}>
            <thead><tr><th>Item</th><th style={{textAlign:'right'}}>Taxable</th>{taxType==='cgst_sgst'?<><th style={{textAlign:'right'}}>CGST</th><th style={{textAlign:'right'}}>SGST</th></>:<th style={{textAlign:'right'}}>IGST</th>}<th style={{textAlign:'right'}}>Total</th></tr></thead>
            <tbody>{totals.items.map((it,i)=>(
              <tr key={i}><td>{it.name} × {it.qty}</td><td className="mono tr">{fc(it.taxable)}</td>{taxType==='cgst_sgst'?<><td className="mono tr">{fc(it.cgst)}</td><td className="mono tr">{fc(it.sgst)}</td></>:<td className="mono tr">{fc(it.igst)}</td>}<td className="mono tr bold">{fc(it.total)}</td></tr>
            ))}</tbody>
          </table>
        </div></div>
      )}
      {totals.grandTotal>0&&(
        <div style={{maxWidth:340,marginLeft:'auto'}}>
          <div className="sum-box">
            <div className="sum-row"><span className="sum-lbl">Subtotal (Taxable)</span><span className="sum-amt">{fc(totals.taxable)}</span></div>
            {taxType==='cgst_sgst'?<><div className="sum-row"><span className="sum-lbl">CGST</span><span className="sum-amt">{fc(totals.cgst)}</span></div><div className="sum-row"><span className="sum-lbl">SGST</span><span className="sum-amt">{fc(totals.sgst)}</span></div></>:<div className="sum-row"><span className="sum-lbl">IGST</span><span className="sum-amt">{fc(totals.igst)}</span></div>}
            <div className="sum-row"><span className="sum-lbl">Round Off</span><span className="sum-amt">{totals.roundOff>=0?'+':''}{totals.roundOff.toFixed(2)}</span></div>
            <div className="sum-row sum-total"><span>Grand Total</span><span className="sum-amt" style={{fontSize:16,color:'var(--primary)'}}>{fc(totals.grandTotal)}</span></div>
          </div>
        </div>
      )}
    </Modal>
  );
};

// ─── BILLING MODULE ───────────────────────────────────────────────────────────
const BillingModule=({invoices,setInvoices,customers,products,setProducts,co})=>{
  const [showForm,setShowForm]=useState(false);
  const [editInv,setEditInv]=useState(null);
  const [printInv,setPrintInv]=useState(null);
  const [delInv,setDelInv]=useState(null);
  const [fs,setFs]=useState('all');
  const [search,setSearch]=useState('');
  const filtered=[...invoices]
    .filter(i=>fs==='all'||(fs==='paid'?i.paid:!i.paid))
    .filter(i=>i.invoiceNo.toLowerCase().includes(search.toLowerCase())||i.customerName.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>b.date.localeCompare(a.date));

  const handleCreate=(inv,isEdit)=>{
    if(isEdit){
      // On edit: restore old stock, apply new stock
      const old=invoices.find(i=>i.id===inv.id);
      setProducts(p=>p.map(prod=>{
        const oldItem=old?.items.find(i=>i.productId===prod.id);
        const newItem=inv.items.find(i=>i.productId===prod.id);
        let stock=prod.stock;
        if(oldItem)stock+=oldItem.qty; // restore
        if(newItem)stock=Math.max(0,stock-newItem.qty); // deduct
        return{...prod,stock};
      }));
      setInvoices(p=>p.map(i=>i.id===inv.id?inv:i));
    } else {
      setInvoices(p=>[...p,inv]);
      setProducts(p=>p.map(prod=>{const item=inv.items.find(i=>i.productId===prod.id);return item?{...prod,stock:Math.max(0,prod.stock-item.qty)}:prod}));
    }
    setShowForm(false);setEditInv(null);
  };

  const handleDelete=()=>{
    // Restore stock on delete
    const inv=invoices.find(i=>i.id===delInv.id);
    if(inv){setProducts(p=>p.map(prod=>{const item=inv.items.find(i=>i.productId===prod.id);return item?{...prod,stock:prod.stock+item.qty}:prod}));}
    setInvoices(p=>p.filter(i=>i.id!==delInv.id));
    setDelInv(null);
  };

  const togglePaid=id=>setInvoices(p=>p.map(i=>i.id===id?{...i,paid:!i.paid}:i));

  return(
    <div className="anim">
      <div className="row between mb4 gap3" style={{flexWrap:'wrap'}}>
        <div className="row gap2" style={{flexWrap:'wrap'}}>
          <input className="form-control" style={{width:220}} placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)}/>
          {['all','paid','pending'].map(s=><button key={s} className={`filter-btn${fs===s?' on':''}`} onClick={()=>setFs(s)}>{s.charAt(0).toUpperCase()+s.slice(1)}</button>)}
        </div>
        <button className="btn btn-primary" onClick={()=>{setEditInv(null);setShowForm(true)}}>+ New Invoice</button>
      </div>
      <div className="card">
        <div className="tbl-wrap">
          {filtered.length===0?(
            <div className="empty"><div className="ei">🧾</div><h3>No Invoices Found</h3><p>Create your first sales invoice</p></div>
          ):(
            <table>
              <thead><tr><th>Invoice No</th><th>Date</th><th>Customer</th><th>Tax Type</th><th style={{textAlign:'right'}}>Taxable</th><th style={{textAlign:'right'}}>GST</th><th style={{textAlign:'right'}}>Total</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>{filtered.map(inv=>(
                <tr key={inv.id}>
                  <td className="mono bold">{inv.invoiceNo}</td>
                  <td>{fd(inv.date)}</td>
                  <td><div className="bold">{inv.customerName}</div><div className="sm muted">{inv.customerState}</div></td>
                  <td><span className={`badge ${inv.taxType==='cgst_sgst'?'badge-primary':'badge-warning'}`}>{inv.taxType==='cgst_sgst'?'CGST+SGST':'IGST'}</span></td>
                  <td className="mono tr">{fc(inv.taxable)}</td>
                  <td className="mono tr">{fc(inv.totalTax)}</td>
                  <td className="mono bold tr">{fc(inv.grandTotal)}</td>
                  <td><span className={`badge ${inv.paid?'badge-success':'badge-warning'}`} style={{cursor:'pointer'}} onClick={()=>togglePaid(inv.id)} title="Click to toggle">{inv.paid?'✓ Paid':'Pending'}</span></td>
                  <td>
                    <div className="row gap2">
                      <button className="btn btn-outline btn-sm" onClick={()=>setPrintInv(inv)}>🖨</button>
                      <button className="btn btn-outline btn-sm" onClick={()=>{setEditInv(inv);setShowForm(true)}}>✏</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>setDelInv(inv)}>🗑</button>
                    </div>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
      </div>
      {showForm&&<InvoiceForm editInvoice={editInv} customers={customers} products={products} invoices={invoices} co={co} onSave={handleCreate} onClose={()=>{setShowForm(false);setEditInv(null)}}/>}
      {printInv&&<InvoicePrint invoice={printInv} co={co} onClose={()=>setPrintInv(null)}/>}
      <Confirm show={!!delInv} msg={`Delete invoice "${delInv?.invoiceNo}" for ${delInv?.customerName}? Stock will be restored.`} onYes={handleDelete} onNo={()=>setDelInv(null)}/>
    </div>
  );
};

const InventoryModule=({products,setProducts})=>{

  const [delP,setDelP]=useState(null);

  const save=p=>{

        <div className="row gap2">
          <input className="form-control" style={{width:220}} placeholder="🔍 Search products..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <button className={`filter-btn${!filterLow?' on':''}`} onClick={()=>setFilterLow(false)}>All ({products.length})</button>
          <button className={`filter-btn${filterLow?' on':''}`} onClick={()=>setFilterLow(true)}>⚠ Low Stock ({low})</button>

      </div>
      <div className="card">
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>Product Name</th><th>HSN</th><th>Unit</th><th>GST</th><th style={{textAlign:'right'}}>Sale Price</th><th style={{textAlign:'right'}}>Purchase Price</th><th style={{textAlign:'center'}}>Stock</th><th style={{textAlign:'center'}}>Min</th><th>Actions</th></tr></thead>
            <tbody>{shown.map(p=>(

                <td className="mono tr">{fc(p.salePrice)}</td>
                <td className="mono tr">{fc(p.purchasePrice)}</td>
                <td className="tc"><span className={p.stock<=p.minStock?'stock-low':'stock-ok'}>{p.stock}</span></td>

                  <button className="btn btn-outline btn-sm" onClick={()=>{setEditP(p);setShowForm(true)}}>✏ Edit</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>setDelP(p)}>🗑</button>
                </div></td>

    </div>
  );

// ─── GST SUMMARY ──────────────────────────────────────────────────────────────

          {title:'Input GST (Purchases)',color:'var(--success)',total:iTotal,c:iCgst,sg:iSgst,ig:iIgst,taxable:iTaxable,count:fPur.length,label:'Purchases'},

              <div style={{borderTop:'1px solid var(--border)',paddingTop:5,marginTop:2,display:'flex',justifyContent:'space-between'}}><span className="muted">Taxable</span><span className="mono">{fc(x.taxable)}</span></div>
              <div style={{display:'flex',justifyContent:'space-between'}}><span className="muted">{x.label}</span><span className="bold">{x.count}</span></div>
            </div>

    const invs=invoices.filter(i=>i.customerId===c.id);
    const total=invs.reduce((s,i)=>s+i.grandTotal,0);
    const paid=invs.filter(i=>i.paid).reduce((s,i)=>s+i.grandTotal,0);
    return{...c,total,paid,balance:total-paid,invoiceCount:invs.length};
  }).filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
  const sel=customers.find(c=>c.id===selId);
  const selInvs=selId?[...invoices.filter(i=>i.customerId===selId)].sort((a,b)=>a.date.localeCompare(b.date)):[];
  let running=0;

    running+=inv.grandTotal;

              </div>
            </div>

      </div>
      <div className="card">

              {[['Total Invoiced',selBal?.total,'var(--text)'],['Total Paid',selBal?.paid,'var(--success)'],['Balance Due',selBal?.balance,'var(--danger)']].map(([l,v,c])=>(

    <div className="anim">

      {low>0&&<div className="alert alert-warn mb4">⚠️ <strong>{low} product{low>1?'s':''}</strong> below min stock. <span style={{cursor:'pointer',textDecoration:'underline'}} onClick={()=>setModule('inventory')}>View Inventory →</span></div>}
      <div className="card">
        <div className="card-header"><h3>Recent Invoices</h3><button className="btn btn-outline btn-sm" onClick={()=>setModule('billing')}>View All</button></div>
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>Invoice No</th><th>Date</th><th>Customer</th><th>Tax Type</th><th style={{textAlign:'right'}}>GST</th><th style={{textAlign:'right'}}>Total</th><th>Status</th></tr></thead>
            <tbody>{recent.map(inv=>(
              <tr key={inv.id}>
                <td className="mono bold">{inv.invoiceNo}</td><td>{fd(inv.date)}</td>
                <td><div className="bold">{inv.customerName}</div><div className="sm muted">{inv.customerState}</div></td>
                <td><span className={`badge ${inv.taxType==='cgst_sgst'?'badge-primary':'badge-warning'}`}>{inv.taxType==='cgst_sgst'?'CGST+SGST':'IGST'}</span></td>
                <td className="mono tr">{fc(inv.totalTax)}</td>
                <td className="mono bold tr">{fc(inv.grandTotal)}</td>
                <td><span className={`badge ${inv.paid?'badge-success':'badge-warning'}`}>{inv.paid?'✓ Paid':'Pending'}</span></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

// ─── SETTINGS MODULE ──────────────────────────────────────────────────────────
const SettingsModule=({co,setCo})=>{
  const [f,setF]=useState({...co});
  const [saved,setSaved]=useState(false);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const handleState=e=>{const st=STATES.find(x=>x.name===e.target.value);if(st)setF(p=>({...p,state:st.name,stateCode:st.code}));};
  const save=()=>{setCo(f);setSaved(true);setTimeout(()=>setSaved(false),3000);};
  const reset=()=>{if(window.confirm('Reset all data to factory defaults? ALL invoices, customers, suppliers and products will be deleted!')){{localStorage.clear();window.location.reload();}}};
  return(
    <div className="anim" style={{maxWidth:700}}>
      {saved&&<div className="alert alert-ok mb4">✅ Company details saved successfully!</div>}
      <div className="card mb4">
        <div className="card-header"><h3>🏢 Company Details</h3></div>
        <div className="card-body">
          <div className="g2">
            <FI label="Company Name *" value={f.name} onChange={e=>s('name',e.target.value)} placeholder="Your Business Name"/>
            <FI label="GSTIN *" value={f.gstin} onChange={e=>s('gstin',e.target.value.toUpperCase())} placeholder="27AABCS1429B1ZB"/>
          </div>
          <div className="g2">
            <FI label="PAN" value={f.pan} onChange={e=>s('pan',e.target.value.toUpperCase())} placeholder="AABCS1429B"/>
            <FG label="State *">
              <select className="form-control" value={f.state} onChange={handleState}>
                {STATES.map(st=><option key={st.code} value={st.name}>{st.name} ({st.code})</option>)}
              </select>
            </FG>
          </div>
          <FI label="Full Address" value={f.address} onChange={e=>s('address',e.target.value)} placeholder="Building, Street, City, PIN, State"/>
          <div className="g2">
            <FI label="Phone" value={f.phone} onChange={e=>s('phone',e.target.value)} placeholder="+91 98765 43210"/>
            <FI label="Email" value={f.email} onChange={e=>s('email',e.target.value)} placeholder="info@yourbusiness.com"/>
          </div>
          <FI label="Bank Details (for invoice footer)" value={f.bank} onChange={e=>s('bank',e.target.value)} placeholder="Bank Name | A/c Number | IFSC Code"/>
          <div style={{marginTop:16}}>
            <button className="btn btn-primary" onClick={save}>💾 Save Company Details</button>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-header"><h3>⚠️ Danger Zone</h3></div>
        <div className="card-body">
          <p style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>This will delete ALL data including invoices, purchases, customers, suppliers, and products. This action cannot be undone.</p>
          <button className="btn btn-danger" onClick={reset}>🗑 Reset All Data to Default</button>
        </div>
      </div>
    </div>
  );
};

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
const TITLES={dashboard:'Dashboard',billing:'Sales Invoice',purchase:'Purchase Entry',inventory:'Inventory',gst:'GST Summary',customers:'Customers',suppliers:'Suppliers',custledger:'Customer Ledger',suppledger:'Supplier Ledger',settings:'Settings'};

const App=()=>{
  const [mod,setMod]=useState('dashboard');
  const [co,setCo]=useState(()=>LS.get('bizgst_co',DEF_CO));
  const [customers,setCustomers]=useState(()=>LS.get('bizgst_customers',DEF_CUSTOMERS));
  const [suppliers,setSuppliers]=useState(()=>LS.get('bizgst_suppliers',DEF_SUPPLIERS));
  const [products,setProducts]=useState(()=>LS.get('bizgst_products',DEF_PRODUCTS));
  const [invoices,setInvoices]=useState(()=>LS.get('bizgst_invoices',DEF_INVOICES));
  const [purchases,setPurchases]=useState(()=>LS.get('bizgst_purchases',DEF_PURCHASES));

  // Persist to localStorage on every change
  useEffect(()=>LS.set('bizgst_co',co),[co]);
  useEffect(()=>LS.set('bizgst_customers',customers),[customers]);
  useEffect(()=>LS.set('bizgst_suppliers',suppliers),[suppliers]);
  useEffect(()=>LS.set('bizgst_products',products),[products]);
  useEffect(()=>LS.set('bizgst_invoices',invoices),[invoices]);
  useEffect(()=>LS.set('bizgst_purchases',purchases),[purchases]);

  return(
    <><OTABanner/>
    <div className="app">
      <Sidebar active={mod} set={setMod} co={co}/>
      <div className="main">
        <div className="topbar">
          <h2>{TITLES[mod]}</h2>
          <div className="row gap3">
            <span style={{fontSize:12,color:'var(--text2)'}}>GSTIN: <span className="mono bold">{co.gstin}</span></span>
            <span style={{fontSize:12,fontWeight:600,color:'var(--text2)'}}>{co.name}</span>
            <button className="btn btn-outline btn-sm" onClick={()=>setMod('settings')}>⚙ Settings</button>
          </div>
        </div>
        <div className="content">
          {mod==='dashboard'&&<Dashboard invoices={invoices} purchases={purchases} products={products} setModule={setMod}/>}
          {mod==='billing'&&<BillingModule invoices={invoices} setInvoices={setInvoices} customers={customers} products={products} setProducts={setProducts} co={co}/>}
          {mod==='purchase'&&<PurchaseModule purchases={purchases} setPurchases={setPurchases} suppliers={suppliers} products={products} setProducts={setProducts} co={co}/>}
          {mod==='inventory'&&<InventoryModule products={products} setProducts={setProducts}/>}
          {mod==='gst'&&<GSTSummaryModule invoices={invoices} purchases={purchases}/>}
          {mod==='customers'&&<CustomersModule customers={customers} setCustomers={setCustomers} invoices={invoices}/>}
          {mod==='suppliers'&&<SuppliersModule suppliers={suppliers} setSuppliers={setSuppliers} purchases={purchases}/>}
          {mod==='custledger'&&<CustomerLedgerModule customers={customers} invoices={invoices}/>}
          {mod==='suppledger'&&<SupplierLedgerModule suppliers={suppliers} purchases={purchases}/>}
          {mod==='settings'&&<SettingsModule co={co} setCo={setCo}/>}
        </div>
      </div>
    </div></>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
