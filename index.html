      .modal{box-shadow:none;border-radius:0;max-width:100%}
      .modal-hd,.modal-ft{display:none}
      body{background:#fff}
    }
  </style>
</head>

  const [update, setUpdate] = useState(null);

  useEffect(() => {
    const check = async () => {
      try {

        const data = await res.json();

const fc=n=>'₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fd=d=>{if(!d)return'';return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})};
const tod=()=>new Date().toISOString().split('T')[0];
const inRange=(d,s,e)=>d>=s&&d<=e;

const getRange=(filter,cs,ce)=>{
  const now=new Date();const yr=now.getFullYear();const mo=now.getMonth();
  switch(filter){
    case'today':{const t=tod();return{start:t,end:t}}
    case'week':{const d=now.getDay();const s=new Date(now);s.setDate(now.getDate()-d);const e=new Date(s);e.setDate(s.getDate()+6);return{start:s.toISOString().split('T')[0],end:e.toISOString().split('T')[0]}}
    case'month':{return{start:new Date(yr,mo,1).toISOString().split('T')[0],end:new Date(yr,mo+1,0).toISOString().split('T')[0]}}
    case'lastmonth':{return{start:new Date(yr,mo-1,1).toISOString().split('T')[0],end:new Date(yr,mo,0).toISOString().split('T')[0]}}
    case'quarter':{const q=Math.floor(mo/3);return{start:new Date(yr,q*3,1).toISOString().split('T')[0],end:new Date(yr,q*3+3,0).toISOString().split('T')[0]}}
    case'year':{return{start:`${yr}-04-01`,end:`${yr+1}-03-31`}}
    case'custom':return{start:cs||'2020-01-01',end:ce||'2099-12-31'}
    default:return{start:'2020-01-01',end:'2099-12-31'}
  }
};

const calcTotals=(items,taxType)=>{
  const calc=items.map(item=>{
    const taxable=+(item.qty*item.rate).toFixed(2);
    const tax=+(taxable*item.gstRate/100).toFixed(2);
    const cgst=taxType==='cgst_sgst'?+(tax/2).toFixed(2):0;
    const sgst=taxType==='cgst_sgst'?+(tax/2).toFixed(2):0;
    const igst=taxType==='igst'?tax:0;
    return{...item,taxable,cgst,sgst,igst,total:+(taxable+tax).toFixed(2)};
  });
  const taxable=+calc.reduce((s,i)=>s+i.taxable,0).toFixed(2);
  const cgst=+calc.reduce((s,i)=>s+i.cgst,0).toFixed(2);
  const sgst=+calc.reduce((s,i)=>s+i.sgst,0).toFixed(2);
  const igst=+calc.reduce((s,i)=>s+i.igst,0).toFixed(2);
  const totalTax=+(cgst+sgst+igst).toFixed(2);
  const gross=taxable+totalTax;
  const paise=+(gross%1).toFixed(2); // decimal part e.g. 0.42 or 0.67
  const grandTotal=paise>=0.50?Math.ceil(gross):Math.floor(gross); // .50–.99 → up | .00–.49 → down
  const roundOff=+((grandTotal-gross).toFixed(2));
  return{items:calc,taxable,cgst,sgst,igst,totalTax,roundOff,grandTotal};
};

const nextInvNo=(invoices)=>{const yr=new Date().getFullYear();const nums=invoices.filter(i=>i.invoiceNo.startsWith(`INV-${yr}`)).map(i=>parseInt(i.invoiceNo.split('-')[2])||0);return`INV-${yr}-${String((nums.length?Math.max(...nums):0)+1).padStart(3,'0')}`};
const nextPurNo=(purchases)=>{const yr=new Date().getFullYear();const nums=purchases.filter(p=>p.purchaseNo.startsWith(`PUR-${yr}`)).map(p=>parseInt(p.purchaseNo.split('-')[2])||0);return`PUR-${yr}-${String((nums.length?Math.max(...nums):0)+1).padStart(3,'0')}`};

// ─── INVOICE FORM ──────────────────────────────────────────────────────────────
const InvoiceForm=({customers,products,invoices,onSave,onClose})=>{
  const [date,setDate]=useState(tod());
  const [custId,setCustId]=useState('');
  const [items,setItems]=useState([{productId:'',name:'',hsn:'',qty:1,rate:0,gstRate:18}]);
  const cust=customers.find(c=>c.id===custId);
  const taxType=cust&&cust.stateCode!==CO.stateCode?'igst':'cgst_sgst';
  const totals=useMemo(()=>{
    const valid=items.filter(i=>i.productId&&i.qty>0&&i.rate>0);
    if(!valid.length)return{items:[],taxable:0,cgst:0,sgst:0,igst:0,totalTax:0,roundOff:0,grandTotal:0};
    return calcTotals(valid,taxType);
  },[items,taxType]);
  const addItem=()=>setItems(p=>[...p,{productId:'',name:'',hsn:'',qty:1,rate:0,gstRate:18}]);
  const removeItem=idx=>setItems(p=>p.filter((_,i)=>i!==idx));
  const updItem=(idx,f,v)=>setItems(p=>{
    const u=[...p];u[idx]={...u[idx],[f]:v};
    if(f==='productId'){const pr=products.find(p=>p.id===v);if(pr)u[idx]={...u[idx],name:pr.name,hsn:pr.hsn,rate:pr.salePrice,gstRate:pr.gstRate};}
    return u;
  });
  const handleSave=()=>{
    if(!custId)return alert('Please select a customer');
    if(totals.grandTotal===0)return alert('Please add at least one item');
    const inv={id:'INV'+Date.now(),invoiceNo:nextInvNo(invoices),date,customerId:custId,customerName:cust.name,customerGstin:cust.gstin,customerAddress:cust.address,customerState:cust.state,customerStateCode:cust.stateCode,taxType,subtotal:totals.taxable,...totals,paid:false};
    onSave(inv);
  };
  return(
    <Modal show title="Create Sales Invoice" size="modal-lg" onClose={onClose}
      footer={<><button className="btn btn-outline" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={handleSave}>💾 Save Invoice</button></>}>
      <div className="g3 mb4">
        <div className="form-group"><label className="form-label">Invoice Date *</label><input type="date" className="form-control" value={date} onChange={e=>setDate(e.target.value)}/></div>
        <div className="form-group" style={{gridColumn:'span 2'}}><label className="form-label">Customer *</label>
          <select className="form-control" value={custId} onChange={e=>setCustId(e.target.value)}>
            <option value="">— Select Customer —</option>
            {customers.map(c=><option key={c.id} value={c.id}>{c.name} ({c.state})</option>)}
          </select>
        </div>
      </div>
      {cust&&<div className="alert alert-info mb4">Tax Type: <strong>{taxType==='cgst_sgst'?`CGST + SGST (Intrastate — ${cust.state})`:`IGST (Interstate — ${cust.state})`}</strong> | GSTIN: <span className="mono">{cust.gstin}</span></div>}
      <div className="card mb4">
        <div className="card-header"><h3>Line Items</h3><button className="btn btn-outline btn-sm" onClick={addItem}>+ Add Row</button></div>
        <div style={{padding:'12px 16px',overflowX:'auto'}}>
          <div className="item-grid item-hdr"><div>Product</div><div>HSN</div><div>Qty</div><div>Rate (₹)</div><div>GST %</div><div></div></div>
          {items.map((item,idx)=>(
            <div key={idx} className="item-grid">
              <select className="form-control" value={item.productId} onChange={e=>updItem(idx,'productId',e.target.value)}>
                <option value="">— Select —</option>
                {products.map(p=><option key={p.id} value={p.id}>{p.name} (Stock: {p.stock} {p.unit})</option>)}
              </select>
              <div className="mono sm muted" style={{paddingLeft:4}}>{item.hsn||'—'}</div>
              <input type="number" className="form-control" value={item.qty} min="1" onChange={e=>updItem(idx,'qty',parseFloat(e.target.value)||0)}/>
              <input type="number" className="form-control" value={item.rate} min="0" step="0.01" onChange={e=>updItem(idx,'rate',parseFloat(e.target.value)||0)}/>
              <select className="form-control" value={item.gstRate} onChange={e=>updItem(idx,'gstRate',parseFloat(e.target.value))}>
                {GST_RATES.map(r=><option key={r} value={r}>{r}%</option>)}
              </select>
              <button className="btn btn-danger btn-sm" onClick={()=>removeItem(idx)} disabled={items.length===1}>✕</button>
            </div>
          ))}
        </div>
      </div>
      {totals.items.length>0&&(
        <div className="card mb4">
          <div style={{padding:'12px 16px',overflowX:'auto'}}>
            <table style={{fontSize:12}}>
              <thead><tr><th>Item</th><th style={{textAlign:'right'}}>Taxable</th>{taxType==='cgst_sgst'?<><th style={{textAlign:'right'}}>CGST</th><th style={{textAlign:'right'}}>SGST</th></>:<th style={{textAlign:'right'}}>IGST</th>}<th style={{textAlign:'right'}}>Total</th></tr></thead>
              <tbody>{totals.items.map((it,i)=>(
                <tr key={i}><td>{it.name} × {it.qty}</td><td className="mono tr">{fc(it.taxable)}</td>{taxType==='cgst_sgst'?<><td className="mono tr">{fc(it.cgst)}</td><td className="mono tr">{fc(it.sgst)}</td></>:<td className="mono tr">{fc(it.igst)}</td>}<td className="mono tr bold">{fc(it.total)}</td></tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}
      {totals.grandTotal>0&&(
        <div style={{maxWidth:340,marginLeft:'auto'}}>
          <div className="sum-box">
            <div className="sum-row"><span className="sum-lbl">Subtotal (Taxable)</span><span className="sum-amt">{fc(totals.taxable)}</span></div>
            {taxType==='cgst_sgst'?<><div className="sum-row"><span className="sum-lbl">CGST</span><span className="sum-amt">{fc(totals.cgst)}</span></div><div className="sum-row"><span className="sum-lbl">SGST</span><span className="sum-amt">{fc(totals.sgst)}</span></div></>:<div className="sum-row"><span className="sum-lbl">IGST</span><span className="sum-amt">{fc(totals.igst)}</span></div>}
            <div className="sum-row"><span className="sum-lbl">Total Tax</span><span className="sum-amt">{fc(totals.totalTax)}</span></div>
            <div className="sum-row"><span className="sum-lbl">Round Off</span><span className="sum-amt">{totals.roundOff>=0?'+':''}{totals.roundOff.toFixed(2)}</span></div>
            <div className="sum-row sum-total"><span>Grand Total</span><span className="sum-amt" style={{fontSize:16,color:'var(--primary)'}}>{fc(totals.grandTotal)}</span></div>
          </div>
        </div>
      )}
    </Modal>
  );
};

                  <td className="mono tr" style={{color:'var(--success)'}}>{fc(p.totalTax)}</td>
                  <td className="mono bold tr">{fc(p.grandTotal)}</td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
      </div>
      {showForm&&<PurchaseForm suppliers={suppliers} products={products} purchases={purchases} onSave={handleCreate} onClose={()=>setShowForm(false)}/>}

};

// ─── PURCHASE FORM ─────────────────────────────────────────────────────────────
const PurchaseForm=({suppliers,products,purchases,onSave,onClose})=>{
  const [date,setDate]=useState(tod());
  const [suppId,setSuppId]=useState('');
  const [items,setItems]=useState([{productId:'',name:'',hsn:'',qty:1,rate:0,gstRate:18}]);
  const supp=suppliers.find(s=>s.id===suppId);
  const taxType=supp&&supp.stateCode!==CO.stateCode?'igst':'cgst_sgst';
  const totals=useMemo(()=>{
    const valid=items.filter(i=>i.productId&&i.qty>0&&i.rate>0);
    if(!valid.length)return{items:[],taxable:0,cgst:0,sgst:0,igst:0,totalTax:0,roundOff:0,grandTotal:0};
    return calcTotals(valid,taxType);
  },[items,taxType]);
  const updItem=(idx,f,v)=>setItems(p=>{
    const u=[...p];u[idx]={...u[idx],[f]:v};
    if(f==='productId'){const pr=products.find(p=>p.id===v);if(pr)u[idx]={...u[idx],name:pr.name,hsn:pr.hsn,rate:pr.purchasePrice,gstRate:pr.gstRate};}
    return u;
  });
  const handleSave=()=>{
    if(!suppId||totals.grandTotal===0)return alert('Please fill all fields');
    const pur={id:'PUR'+Date.now(),purchaseNo:nextPurNo(purchases),date,supplierId:suppId,supplierName:supp.name,supplierGstin:supp.gstin,taxType,subtotal:totals.taxable,...totals,paid:false};
    onSave(pur);
  };
  return(
    <Modal show title="New Purchase Entry" size="modal-lg" onClose={onClose}
      footer={<><button className="btn btn-outline" onClick={onClose}>Cancel</button><button className="btn btn-success" onClick={handleSave}>💾 Save Purchase</button></>}>
      <div className="g3 mb4">
        <div className="form-group"><label className="form-label">Purchase Date *</label><input type="date" className="form-control" value={date} onChange={e=>setDate(e.target.value)}/></div>
        <div className="form-group" style={{gridColumn:'span 2'}}><label className="form-label">Supplier *</label>
          <select className="form-control" value={suppId} onChange={e=>setSuppId(e.target.value)}>
            <option value="">— Select Supplier —</option>
            {suppliers.map(s=><option key={s.id} value={s.id}>{s.name} ({s.state})</option>)}
          </select>
        </div>
      </div>
      {supp&&<div className="alert alert-ok mb4">Tax Type: <strong>{taxType==='cgst_sgst'?'CGST + SGST (Intrastate)':'IGST (Interstate)'}</strong> | GSTIN: <span className="mono">{supp.gstin}</span></div>}
      <div className="card mb4">
        <div className="card-header"><h3>Items</h3><button className="btn btn-outline btn-sm" onClick={()=>setItems(p=>[...p,{productId:'',name:'',hsn:'',qty:1,rate:0,gstRate:18}])}>+ Add</button></div>
        <div style={{padding:'12px 16px'}}>
          <div className="item-grid item-hdr"><div>Product</div><div>HSN</div><div>Qty</div><div>Rate (₹)</div><div>GST %</div><div></div></div>
          {items.map((item,idx)=>(
            <div key={idx} className="item-grid">
              <select className="form-control" value={item.productId} onChange={e=>updItem(idx,'productId',e.target.value)}>
                <option value="">— Select —</option>
                {products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
              <div className="mono sm muted">{item.hsn||'—'}</div>
              <input type="number" className="form-control" value={item.qty} min="1" onChange={e=>updItem(idx,'qty',parseFloat(e.target.value)||0)}/>
              <input type="number" className="form-control" value={item.rate} step="0.01" onChange={e=>updItem(idx,'rate',parseFloat(e.target.value)||0)}/>
              <select className="form-control" value={item.gstRate} onChange={e=>updItem(idx,'gstRate',parseFloat(e.target.value))}>
                {GST_RATES.map(r=><option key={r} value={r}>{r}%</option>)}
              </select>
              <button className="btn btn-danger btn-sm" onClick={()=>setItems(p=>p.filter((_,i)=>i!==idx))} disabled={items.length===1}>✕</button>
            </div>
          ))}
        </div>
      </div>
      {totals.grandTotal>0&&(
        <div style={{maxWidth:320,marginLeft:'auto'}}>
          <div className="sum-box">
            <div className="sum-row"><span className="sum-lbl">Taxable</span><span className="sum-amt">{fc(totals.taxable)}</span></div>
            {taxType==='cgst_sgst'?<><div className="sum-row"><span className="sum-lbl">CGST</span><span className="sum-amt">{fc(totals.cgst)}</span></div><div className="sum-row"><span className="sum-lbl">SGST</span><span className="sum-amt">{fc(totals.sgst)}</span></div></>:<div className="sum-row"><span className="sum-lbl">IGST</span><span className="sum-amt">{fc(totals.igst)}</span></div>}
            <div className="sum-row sum-total"><span>Grand Total</span><span className="sum-amt" style={{color:'var(--success)'}}>{fc(totals.grandTotal)}</span></div>
          </div>
        </div>
      )}
    </Modal>
  );
};

// ─── INVENTORY ─────────────────────────────────────────────────────────────────
const InventoryModule=({products,setProducts})=>{
  const [showForm,setShowForm]=useState(false);
  const [editP,setEditP]=useState(null);
  const [filterLow,setFilterLow]=useState(false);
  const low=products.filter(p=>p.stock<=p.minStock).length;
  const shown=filterLow?products.filter(p=>p.stock<=p.minStock):products;
  const handleSave=p=>{
    if(editP)setProducts(prev=>prev.map(x=>x.id===p.id?p:x));
    else setProducts(prev=>[...prev,{...p,id:'P'+Date.now()}]);
    setShowForm(false);setEditP(null);
  };
  const handleDel=id=>{if(window.confirm('Delete this product?'))setProducts(p=>p.filter(x=>x.id!==id))};
  return(
    <div className="anim">
      {low>0&&<div className="alert alert-warn mb4">⚠️ <strong>{low}</strong> product{low>1?'s are':' is'} at or below minimum stock. Please reorder soon.</div>}
      <div className="row between mb4">
        <div className="row gap2">
          <button className={`filter-btn${!filterLow?' on':''}`} onClick={()=>setFilterLow(false)}>All Products ({products.length})</button>
          <button className={`filter-btn${filterLow?' on':''}`} onClick={()=>setFilterLow(true)} style={low>0?{borderColor:'var(--danger)',color:'var(--danger)'}:{}}>⚠ Low Stock ({low})</button>
        </div>
        <button className="btn btn-primary" onClick={()=>{setEditP(null);setShowForm(true)}}>+ Add Product</button>
      </div>
      <div className="card">
        <div className="tbl-wrap">
          <table>
            <thead><tr><th>Product Name</th><th>HSN</th><th>Unit</th><th>GST</th><th style={{textAlign:'right'}}>Sale Price</th><th style={{textAlign:'right'}}>Purchase Price</th><th style={{textAlign:'center'}}>Stock</th><th style={{textAlign:'center'}}>Min Stock</th><th>Actions</th></tr></thead>
            <tbody>{shown.map(p=>(
              <tr key={p.id}>
                <td className="bold">{p.name}</td>
                <td className="mono">{p.hsn}</td>
                <td>{p.unit}</td>
                <td><span className="badge badge-primary">{p.gstRate}%</span></td>
                <td className="mono tr">{fc(p.salePrice)}</td>
                <td className="mono tr">{fc(p.purchasePrice)}</td>
                <td className="tc"><span className={p.stock<=p.minStock?'stock-low':'stock-ok'}>{p.stock}</span></td>
                <td className="tc muted">{p.minStock}</td>
                <td><div className="row gap2"><button className="btn btn-outline btn-sm" onClick={()=>{setEditP(p);setShowForm(true)}}>Edit</button><button className="btn btn-danger btn-sm" onClick={()=>handleDel(p.id)}>Del</button></div></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>

    </div>
  );
};

// ─── GST SUMMARY ───────────────────────────────────────────────────────────────
const GSTSummaryModule=({invoices,purchases})=>{
  const [filter,setFilter]=useState('month');
  const [cs,setCs]=useState('');
  const [ce,setCe]=useState('');
  const range=getRange(filter,cs,ce);
  const fInv=invoices.filter(i=>inRange(i.date,range.start,range.end));
  const fPur=purchases.filter(p=>inRange(p.date,range.start,range.end));
  const oCgst=fInv.reduce((s,i)=>s+(i.cgst||0),0);
  const oSgst=fInv.reduce((s,i)=>s+(i.sgst||0),0);
  const oIgst=fInv.reduce((s,i)=>s+(i.igst||0),0);
  const oTotal=oCgst+oSgst+oIgst;
  const oTaxable=fInv.reduce((s,i)=>s+(i.taxable||0),0);
  const iCgst=fPur.reduce((s,p)=>s+(p.cgst||0),0);
  const iSgst=fPur.reduce((s,p)=>s+(p.sgst||0),0);
  const iIgst=fPur.reduce((s,p)=>s+(p.igst||0),0);
  const iTotal=iCgst+iSgst+iIgst;
  const iTaxable=fPur.reduce((s,p)=>s+(p.taxable||0),0);
  const net=oTotal-iTotal;
  const filters=[{id:'today',l:'Today'},{id:'week',l:'This Week'},{id:'month',l:'This Month'},{id:'lastmonth',l:'Last Month'},{id:'quarter',l:'This Quarter'},{id:'year',l:'This FY'},{id:'custom',l:'Custom'}];
  return(
    <div className="anim">
      <div className="filter-bar">
        {filters.map(f=><button key={f.id} className={`filter-btn${filter===f.id?' on':''}`} onClick={()=>setFilter(f.id)}>{f.l}</button>)}
        {filter==='custom'&&<>
          <input type="date" className="form-control" style={{width:150}} value={cs} onChange={e=>setCs(e.target.value)}/>
          <span className="muted sm">to</span>
          <input type="date" className="form-control" style={{width:150}} value={ce} onChange={e=>setCe(e.target.value)}/>
        </>}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16,marginBottom:20}}>
        <div className="gst-card" style={{borderLeft:'4px solid var(--danger)'}}>
          <div className="gst-ttl">Output GST (From Sales)</div>
          <div className="gst-amt" style={{color:'var(--danger)'}}>{fc(oTotal)}</div>
          <div style={{marginTop:12,fontSize:12,display:'flex',flexDirection:'column',gap:5}}>
            {[['CGST',fc(oCgst)],['SGST',fc(oSgst)],['IGST',fc(oIgst)]].map(([l,v])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between'}}><span className="muted">{l}</span><span className="mono bold">{v}</span></div>
            ))}
            <div style={{borderTop:'1px solid var(--border)',paddingTop:5,marginTop:2,display:'flex',justifyContent:'space-between'}}><span className="muted">Taxable Sales</span><span className="mono">{fc(oTaxable)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between'}}><span className="muted">Invoices Count</span><span className="bold">{fInv.length}</span></div>
          </div>
        </div>
        <div className="gst-card" style={{borderLeft:'4px solid var(--success)'}}>
          <div className="gst-ttl">Input GST Credit (Purchases)</div>
          <div className="gst-amt" style={{color:'var(--success)'}}>{fc(iTotal)}</div>
          <div style={{marginTop:12,fontSize:12,display:'flex',flexDirection:'column',gap:5}}>
            {[['CGST',fc(iCgst)],['SGST',fc(iSgst)],['IGST',fc(iIgst)]].map(([l,v])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between'}}><span className="muted">{l}</span><span className="mono bold">{v}</span></div>
            ))}
            <div style={{borderTop:'1px solid var(--border)',paddingTop:5,marginTop:2,display:'flex',justifyContent:'space-between'}}><span className="muted">Taxable Purchases</span><span className="mono">{fc(iTaxable)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between'}}><span className="muted">Purchase Count</span><span className="bold">{fPur.length}</span></div>
          </div>
        </div>
        <div className="gst-card" style={{borderLeft:'4px solid var(--primary)',background:net>0?'#FFF7ED':'#F0FDF4'}}>
          <div className="gst-ttl">Net GST Payable</div>
          <div className="gst-amt" style={{color:net>0?'var(--warning)':'var(--success)'}}>{fc(Math.abs(net))}</div>
          <div style={{marginTop:8,fontSize:13,fontWeight:700,color:net>0?'var(--warning)':'var(--success)'}}>{net>0?'⬆ Payable to Government':'⬇ Credit Available (ITC)'}</div>

            <div style={{display:'flex',justifyContent:'space-between'}}><span className="muted">Output GST</span><span className="mono">{fc(oTotal)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between'}}><span className="muted">(−) Input Credit</span><span className="mono">({fc(iTotal)})</span></div>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:4,marginTop:2,display:'flex',justifyContent:'space-between',fontWeight:700}}><span>Net</span><span className="mono">{fc(net)}</span></div>
          </div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="card">
          <div className="card-header"><h3>Sales Detail</h3><span className="badge badge-danger">{fInv.length} invoices</span></div>
          <div className="tbl-wrap">
            {fInv.length===0?<div style={{padding:20,textAlign:'center',color:'var(--text2)',fontSize:13}}>No sales in this period</div>:(
              <table style={{fontSize:12}}>

                ))}</tbody>
              </table>
            )}
          </div>
        </div>
        <div className="card">
          <div className="card-header"><h3>Purchase Detail</h3><span className="badge badge-success">{fPur.length} entries</span></div>
          <div className="tbl-wrap">
            {fPur.length===0?<div style={{padding:20,textAlign:'center',color:'var(--text2)',fontSize:13}}>No purchases in this period</div>:(
              <table style={{fontSize:12}}>
                <thead><tr><th>Purchase</th><th>Supplier</th><th style={{textAlign:'right'}}>Taxable</th><th style={{textAlign:'right'}}>Input Tax</th></tr></thead>

                  <tr key={p.id}><td className="mono">{p.purchaseNo}</td><td>{p.supplierName}</td><td className="mono tr">{fc(p.taxable)}</td><td className="mono bold tr" style={{color:'var(--success)'}}>{fc(p.totalTax)}</td></tr>

            )}

        </div>
      </div>

  );
};

// ─── CUSTOMER LEDGER ───────────────────────────────────────────────────────────
const CustomerLedgerModule=({customers,invoices})=>{
  const [selId,setSelId]=useState(null);
  const balances=customers.map(c=>{
    const invs=invoices.filter(i=>i.customerId===c.id);
    const total=invs.reduce((s,i)=>s+i.grandTotal,0);
    const paid=invs.filter(i=>i.paid).reduce((s,i)=>s+i.grandTotal,0);
    return{...c,total,paid,balance:total-paid};
  });
  const sel=customers.find(c=>c.id===selId);
  const selInvs=selId?[...invoices.filter(i=>i.customerId===selId)].sort((a,b)=>a.date.localeCompare(b.date)):[];
  let running=0;
  const rows=selInvs.map(inv=>{running+=inv.grandTotal;const bal=running-(inv.paid?inv.grandTotal:0);return{...inv,runBal:bal>=0?bal:0}});
  const selBal=balances.find(c=>c.id===selId);
  return(
    <div className="anim" style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:16}}>
      <div className="card" style={{alignSelf:'start'}}>
        <div className="card-header"><h3>Customers ({customers.length})</h3></div>
        {balances.map(c=>(
          <div key={c.id} className={`party-item${selId===c.id?' sel':''}`} onClick={()=>setSelId(c.id)}>
            <div className="bold sm">{c.name}</div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:1}}>{c.state}</div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:12}}>
              <span className="muted">Balance:</span>
              <span className="mono bold" style={{color:c.balance>0?'var(--danger)':'var(--success)'}}>{fc(c.balance)}</span>
            </div>
          </div>
        ))}
      </div>
      <div className="card">
        {!sel?(
          <div className="empty"><div className="ei">👈</div><h3>Select a Customer</h3><p>Click on a customer to view their ledger</p></div>
        ):(
          <>
            <div className="card-header">
              <div><h3>{sel.name}</h3><div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>GSTIN: {sel.gstin} | {sel.phone}</div></div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:11,color:'var(--text2)'}}>Outstanding</div>
                <div style={{fontSize:18,fontWeight:800,color:'var(--danger)',fontFamily:'JetBrains Mono'}}>{fc(selBal?.balance||0)}</div>
              </div>
            </div>
            <div style={{padding:'12px 16px',background:'#F9FAFB',borderBottom:'1px solid var(--border)',display:'flex',gap:24}}>
              {[['Total Invoiced',selBal?.total,'var(--text)'],['Total Paid',selBal?.paid,'var(--success)'],['Balance Due',selBal?.balance,'var(--danger)']].map(([l,v,c])=>(
                <div key={l}><div style={{fontSize:11,color:'var(--text2)'}}>{l}</div><div style={{fontFamily:'JetBrains Mono',fontWeight:700,color:c}}>{fc(v||0)}</div></div>
              ))}
            </div>
            <div className="tbl-wrap">
              <table>
                <thead><tr><th>Date</th><th>Invoice No</th><th>Particulars</th><th style={{textAlign:'right'}}>Debit (Dr)</th><th style={{textAlign:'right'}}>Credit (Cr)</th><th style={{textAlign:'right'}}>Balance</th></tr></thead>
                <tbody>
                  {rows.length===0?<tr><td colSpan={6} style={{textAlign:'center',padding:24,color:'var(--text2)'}}>No transactions</td></tr>:
                  rows.map((row,i)=>(
                    <tr key={i}>
                      <td style={{fontSize:12}}>{fd(row.date)}</td>
                      <td className="mono">{row.invoiceNo}</td>
                      <td><div style={{fontSize:13}}>Sales Invoice</div><div style={{fontSize:11,color:'var(--text2)'}}>{row.items.length} item(s) | GST: {fc(row.totalTax)}</div></td>
                      <td className="mono bold tr">{fc(row.grandTotal)}</td>
                      <td className="mono tr" style={{color:'var(--success)'}}>{row.paid?fc(row.grandTotal):'—'}</td>
                      <td className="mono bold tr" style={{color:row.runBal>0?'var(--danger)':'var(--success)'}}>{fc(row.runBal)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

// ─── SUPPLIER LEDGER ───────────────────────────────────────────────────────────
const SupplierLedgerModule=({suppliers,purchases})=>{
  const [selId,setSelId]=useState(null);
  const balances=suppliers.map(s=>{
    const purs=purchases.filter(p=>p.supplierId===s.id);
    const total=purs.reduce((sum,p)=>sum+p.grandTotal,0);
    const paid=purs.filter(p=>p.paid).reduce((sum,p)=>sum+p.grandTotal,0);
    return{...s,total,paid,balance:total-paid};
  });
  const sel=suppliers.find(s=>s.id===selId);
  const selPurs=selId?[...purchases.filter(p=>p.supplierId===selId)].sort((a,b)=>a.date.localeCompare(b.date)):[];
  let running=0;
  const rows=selPurs.map(p=>{running+=p.grandTotal;const bal=running-(p.paid?p.grandTotal:0);return{...p,runBal:bal>=0?bal:0}});
  const selBal=balances.find(s=>s.id===selId);
  return(
    <div className="anim" style={{display:'grid',gridTemplateColumns:'280px 1fr',gap:16}}>
      <div className="card" style={{alignSelf:'start'}}>
        <div className="card-header"><h3>Suppliers ({suppliers.length})</h3></div>
        {balances.map(s=>(
          <div key={s.id} className={`party-item${selId===s.id?' sel':''}`} style={{background:selId===s.id?'#F0FDF4':undefined}} onClick={()=>setSelId(s.id)}>
            <div className="bold sm">{s.name}</div>
            <div style={{fontSize:11,color:'var(--text2)',marginTop:1}}>{s.state}</div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:12}}>
              <span className="muted">Payable:</span>
              <span className="mono bold" style={{color:s.balance>0?'var(--warning)':'var(--success)'}}>{fc(s.balance)}</span>
            </div>
          </div>
        ))}
      </div>
      <div className="card">
        {!sel?(
          <div className="empty"><div className="ei">👈</div><h3>Select a Supplier</h3><p>Click on a supplier to view their ledger</p></div>
        ):(
          <>
            <div className="card-header">
              <div><h3>{sel.name}</h3><div style={{fontSize:11,color:'var(--text2)',marginTop:2}}>GSTIN: {sel.gstin} | {sel.phone}</div></div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:11,color:'var(--text2)'}}>Outstanding Payable</div>
                <div style={{fontSize:18,fontWeight:800,color:'var(--warning)',fontFamily:'JetBrains Mono'}}>{fc(selBal?.balance||0)}</div>
              </div>
            </div>
            <div style={{padding:'12px 16px',background:'#F9FAFB',borderBottom:'1px solid var(--border)',display:'flex',gap:24}}>
              {[['Total Purchased',selBal?.total,'var(--text)'],['Total Paid',selBal?.paid,'var(--success)'],['Balance Payable',selBal?.balance,'var(--warning)']].map(([l,v,c])=>(
                <div key={l}><div style={{fontSize:11,color:'var(--text2)'}}>{l}</div><div style={{fontFamily:'JetBrains Mono',fontWeight:700,color:c}}>{fc(v||0)}</div></div>
              ))}
            </div>
            <div className="tbl-wrap">
              <table>
                <thead><tr><th>Date</th><th>Purchase No</th><th>Particulars</th><th style={{textAlign:'right'}}>Credit (Cr)</th><th style={{textAlign:'right'}}>Debit (Dr)</th><th style={{textAlign:'right'}}>Balance</th></tr></thead>
                <tbody>
                  {rows.length===0?<tr><td colSpan={6} style={{textAlign:'center',padding:24,color:'var(--text2)'}}>No transactions</td></tr>:
                  rows.map((row,i)=>(
                    <tr key={i}>
                      <td style={{fontSize:12}}>{fd(row.date)}</td>
                      <td className="mono">{row.purchaseNo}</td>
                      <td><div style={{fontSize:13}}>Purchase Invoice</div><div style={{fontSize:11,color:'var(--text2)'}}>Input GST: {fc(row.totalTax)}</div></td>
                      <td className="mono bold tr">{fc(row.grandTotal)}</td>
                      <td className="mono tr" style={{color:'var(--success)'}}>{row.paid?fc(row.grandTotal):'—'}</td>
                      <td className="mono bold tr" style={{color:row.runBal>0?'var(--warning)':'var(--success)'}}>{fc(row.runBal)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

// ─── APP ROOT ──────────────────────────────────────────────────────────────────
const TITLES={dashboard:'Dashboard',billing:'Sales Invoice',purchase:'Purchase Entry',inventory:'Inventory Management',gst:'GST Summary Report',customers:'Customer Ledger',suppliers:'Supplier Ledger'};

const App=()=>{
  const [mod,setMod]=useState('dashboard');
  const [customers]=useState(IC);
  const [suppliers]=useState(IS);
  const [products,setProducts]=useState(IP);
  const [invoices,setInvoices]=useState(II);
  const [purchases,setPurchases]=useState(IPU);
  return(
    <><OTABanner/>
    <div className="app">
      <Sidebar active={mod} set={setMod}/>
      <div className="main">
        <div className="topbar">
          <h2>{TITLES[mod]}</h2>
          <div className="row gap3">
            <span style={{fontSize:12,color:'var(--text2)'}}>GSTIN: <span className="mono bold">{CO.gstin}</span></span>
            <span style={{fontSize:12,fontWeight:600,color:'var(--text2)'}}>{CO.name}</span>
          </div>
        </div>
        <div className="content">
          {mod==='dashboard'&&<Dashboard invoices={invoices} purchases={purchases} products={products} setModule={setMod}/>}
          {mod==='billing'&&<BillingModule invoices={invoices} setInvoices={setInvoices} customers={customers} products={products} setProducts={setProducts}/>}
          {mod==='purchase'&&<PurchaseModule purchases={purchases} setPurchases={setPurchases} suppliers={suppliers} products={products} setProducts={setProducts}/>}
          {mod==='inventory'&&<InventoryModule products={products} setProducts={setProducts}/>}
          {mod==='gst'&&<GSTSummaryModule invoices={invoices} purchases={purchases}/>}
          {mod==='customers'&&<CustomerLedgerModule customers={customers} invoices={invoices}/>}
          {mod==='suppliers'&&<SupplierLedgerModule suppliers={suppliers} purchases={purchases}/>}
        </div>
      </div>
    </div></>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
